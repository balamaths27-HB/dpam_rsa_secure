<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPAM-RSA Spectral Secure Messaging System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        /* High-attraction premium glass panels with integrated neon glow vectors */
        .sender-glass {
            background: linear-gradient(135deg, rgba(16, 24, 48, 0.85) 0%, rgba(7, 11, 24, 0.95) 100%);
            border: 1px solid rgba(59, 130, 246, 0.25);
            box-shadow: 0 20px 40px -15px rgba(7, 11, 24, 0.9), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .sender-glass:hover {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 30px -5px rgba(59, 130, 246, 0.15);
        }
        
        .receiver-glass {
            background: linear-gradient(135deg, rgba(12, 32, 28, 0.85) 0%, rgba(4, 15, 13, 0.95) 100%);
            border: 1px solid rgba(16, 185, 129, 0.25);
            box-shadow: 0 20px 40px -15px rgba(4, 15, 13, 0.9), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .receiver-glass:hover {
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 30px -5px rgba(16, 185, 129, 0.15);
        }
        
        @keyframes techRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-tech-spin {
            animation: techRotate 25s linear infinite;
            transform-origin: center;
        }
    </style>
</head>
